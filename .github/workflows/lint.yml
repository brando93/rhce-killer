name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on every .sh
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::bash syntax error"
              fail=1
            fi
          done < <(find . -name '*.sh' -not -path './.git/*')
          exit $fail

      - name: shellcheck (warnings only — not blocking)
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -S warning -x || true

  yaml:
    name: YAML files (playbook solutions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        run: |
          pip install --quiet yamllint
          # The solutions inside READMEs are markdown-embedded YAML; we lint
          # only standalone .yml/.yaml files at root.
          if find . -maxdepth 3 -name '*.yml' -o -name '*.yaml' \
               | grep -v -E '^\./\.github/' \
               | head -1 > /dev/null 2>&1; then
            find . -maxdepth 3 \( -name '*.yml' -o -name '*.yaml' \) \
              -not -path './.github/*' \
              -exec yamllint -d 'relaxed' {} +
          else
            echo "No standalone YAML files found — skipping."
          fi

  terraform:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: terraform fmt -check
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: terraform validate (skip cloud auth)
        run: |
          cd terraform
          terraform init -backend=false -input=false
          terraform validate

  makefile:
    name: Makefile and orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: make -n up parses
        run: make -n up >/dev/null

      - name: make -n destroy parses
        run: make -n destroy >/dev/null 2>&1 || true   # interactive `read`

      - name: scripts/lab-up.sh parses
        run: bash -n scripts/lab-up.sh

      - name: scripts/lib/*.sh parses
        run: |
          for f in scripts/lib/*.sh; do bash -n "$f"; done

  ansible-lint:
    name: ansible-lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install --quiet ansible ansible-lint

      - name: Lint repo (relaxed)
        run: |
          ansible-lint --profile=min --offline . || true
